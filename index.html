<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>

<form>
<label for="nome">Nome Completo:</label><br>
<input type="text" id="nome" required><br><br>

<label for="email">E-mail:</label><br>
<input type="email" id="email" required><br><br>

<label for="senha">Senha:</label><br>
<input type="password" id="senha" required><br><br>

<label for="data">Data de Nascimento:</label><br>
<input type="date" id="data" required><br><br>

<label for="cpf">CPF:</label><br>
<input type="text" id="cpf" required><br><br>

<label for="telefone">Telefone:</label><br>
<input type="tel" id="telefone" required><br><br>

<label for="mae">Nome da mãe:</label><br>
<input type="text" id="mae" required><br><br>

<label for="pai">Nome do pai:</label><br>
<input type="text" id="pai" required><br><br>

<label for="estadoCivil">Estado Civil:</label><br>
<select id="estadoCivil" required>
<option>Solteiro</option>
<option>Casado</option>
<option>União Estável</option>
<option>Separado</option>
</select>

<h2>Endereço</h2>

<label for="rua">Rua:</label><br>
<input type="text" id="rua" required><br><br>

<label for="numero">Número:</label><br>
<input type="number" id="numero" required><br><br>

<label for="bairro">Bairro:</label><br>
<input type="text" id="bairro" required><br><br>

<label for="cidade">Cidade:</label><br>
<input type="text" id="cidade" required><br><br>

<label for="estado">Estado:</label><br>
<select id="estado" required>
<option>Pernambuco</option>
<option>São Paulo</option>
<option>Bahia</option>
<option>Ceará</option>
</select><br><br>

<label for="cep">CEP:</label><br>
<input type="text" id="cep" required><br><br>

<label for="pais">País:</label><br>
<input type="text" id="pais" required><br><br>

<h2>Sexo</h2>

<input type="radio" id="masculino" name="sexo">
<label for="masculino">Masculino</label><br>

<input type="radio" id="feminino" name="sexo">
<label for="feminino">Feminino</label><br><br>

<h2>Tecnologias</h2>

<input type="checkbox" id="html">
<label for="html">HTML</label><br>

<input type="checkbox" id="css">
<label for="css">CSS</label><br>

<input type="checkbox" id="javascript">
<label for="javascript">JavaScript</label><br>

<input type="checkbox" id="python">
<label for="python">Python</label><br><br>

<h2>Comentários</h2>

<label for="comentarios">Observações:</label><br>
<textarea id="comentarios" rows="5" cols="40"></textarea><br><br>

<button type="submit">Enviar Cadastro</button>

<button type="reset">Limpar Formulário</button>

</form>
</body>
</html>
